name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Style config guardrails
        run: npm run check:styles:config

      - name: Production build + CSS verification
        run: npm run build

      - name: Lint
        run: npm run lint
